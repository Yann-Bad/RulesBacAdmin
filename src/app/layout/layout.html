<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">⚙</span>
      <span class="brand-name">RulesBac <em>Admin</em></span>
    </div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active">Tableau de bord</a>
      <a routerLink="/users" routerLinkActive="active">Utilisateurs</a>
      <a routerLink="/roles" routerLinkActive="active">Rôles</a>
      <a routerLink="/audit" routerLinkActive="active">Journal d'audit</a>
      <a routerLink="/clients" routerLinkActive="active">Clients OAuth2</a>
      <a routerLink="/presence" routerLinkActive="active">Présence</a>
      <a routerLink="/centres" routerLinkActive="active">Centres</a>
    </nav>

    <div class="user-area">
      <button class="avatar-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
        <span class="avatar">{{ userInitials() }}</span>
      </button>

      @if (menuOpen()) {
        <div class="menu-backdrop" (click)="closeMenu()"></div>
        <div class="dropdown">
          <div class="dropdown-user">
            <span class="dropdown-avatar">{{ userInitials() }}</span>
            <div>
              <p class="dropdown-name">{{ currentUser()?.userName }}</p>
              <p class="dropdown-email">{{ currentUser()?.email }}</p>
              <span class="role-chip">SuperAdmin</span>
            </div>
          </div>
          <hr class="dropdown-divider" />
          <a class="dropdown-item" routerLink="/profile" (click)="closeMenu()">
            <span>👤</span> Mon profil
          </a>
          <a class="dropdown-item" routerLink="/guide" (click)="closeMenu()">
            <span>📖</span> Guide d'utilisation
          </a>
          <button class="dropdown-item logout" (click)="logout()">
            <span>⎋</span> Déconnexion
          </button>
        </div>
      }
    </div>
  </div>
</header>

<main class="main">
  <router-outlet />
</main>

<app-toast />
