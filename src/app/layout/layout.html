<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">⚙</span>
      <span class="brand-name">RulesBac <em>Admin</em></span>
    </div>

    <nav class="nav">
      <!-- Overview -->
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon">▤</span> Tableau de bord
      </a>

      <span class="nav-sep"></span>

      <!-- Identity & access -->
      <a routerLink="/users" routerLinkActive="active">
        <span class="nav-icon">👥</span> Utilisateurs
      </a>
      <a routerLink="/roles" routerLinkActive="active">
        <span class="nav-icon">🛡</span> Rôles
      </a>
      <a routerLink="/permissions" routerLinkActive="active">
        <span class="nav-icon">🔑</span> Permissions
      </a>
      <a routerLink="/clients" routerLinkActive="active">
        <span class="nav-icon">⬡</span> Clients OAuth2
      </a>

      <span class="nav-sep"></span>

      <!-- Operations -->
      <a routerLink="/centres" routerLinkActive="active">
        <span class="nav-icon">🏢</span> Centres
      </a>
      <a routerLink="/presence" routerLinkActive="active">
        <span class="nav-icon">📡</span> Présence
      </a>
      <a routerLink="/ad-users" routerLinkActive="active">
        <span class="nav-icon">🗂️</span> Annuaire AD
      </a>
      <a routerLink="/audit" routerLinkActive="active">
        <span class="nav-icon">📋</span> Audit
      </a>
    </nav>

    <div class="user-area">
      <button class="avatar-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
        <span class="avatar">{{ userInitials() }}</span>
      </button>

      @if (menuOpen()) {
        <div class="menu-backdrop" (click)="closeMenu()"></div>
        <div class="dropdown">
          <div class="dropdown-user">
            <span class="dropdown-avatar">{{ userInitials() }}</span>
            <div>
              <p class="dropdown-name">{{ currentUser()?.userName }}</p>
              <p class="dropdown-email">{{ currentUser()?.email }}</p>
              <span class="role-chip">SuperAdmin</span>
            </div>
          </div>
          <hr class="dropdown-divider" />
          <a class="dropdown-item" routerLink="/profile" (click)="closeMenu()">
            <span>👤</span> Mon profil
          </a>
          <a class="dropdown-item" routerLink="/guide" (click)="closeMenu()">
            <span>📖</span> Guide d'utilisation
          </a>
          <button class="dropdown-item logout" (click)="logout()">
            <span>⎋</span> Déconnexion
          </button>
        </div>
      }
    </div>
  </div>
</header>

<main class="main">
  <router-outlet />
</main>

<app-toast />
