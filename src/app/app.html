@if (isAuthenticated()) {
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⚙</span>
        <span class="brand-name">RulesBac <em>Admin</em></span>
      </div>

      <nav class="nav">
        <a routerLink="/users" routerLinkActive="active">Utilisateurs</a>
        <a routerLink="/roles" routerLinkActive="active">Rôles</a>
      </nav>

      <div class="user-area">
        <button class="avatar-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
          <span class="avatar">{{ userInitials() }}</span>
        </button>

        @if (menuOpen()) {
          <div class="menu-backdrop" (click)="closeMenu()"></div>
          <div class="dropdown">
            <div class="dropdown-user">
              <span class="dropdown-avatar">{{ userInitials() }}</span>
              <div>
                <p class="dropdown-name">{{ currentUser()?.userName }}</p>
                <p class="dropdown-email">{{ currentUser()?.email }}</p>
                <span class="role-chip">SuperAdmin</span>
              </div>
            </div>
            <hr class="dropdown-divider" />
            <button class="dropdown-item logout" (click)="logout()">
              <span>⎋</span> Déconnexion
            </button>
          </div>
        }
      </div>
    </div>
  </header>
}

<main class="main">
  <router-outlet />
</main>
